<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频大模型整合平台 - 登录</title>
    <link rel="stylesheet" href="css/pc_style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="window-container">
        <div class="title-bar">
            <div class="title-bar-left">
                <span class="title-bar-logo">视频大模型整合平台</span>
            </div>
            <div class="window-controls">
                <button class="window-control minimize"></button>
                <button class="window-control maximize"></button>
                <button class="window-control close"></button>
            </div>
        </div>
        
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="logo">视频大模型整合平台</div>
                    <p class="slogan">一站式AI内容生成解决方案</p>
                </div>
                
                <div class="login-tabs">
                    <button class="tab-btn active" data-tab="personal">个人号登录</button>
                    <button class="tab-btn" data-tab="enterprise">企业号登录</button>
                </div>
                
                <div class="login-form">
                    <div class="form-group">
                        <label>账号</label>
                        <input type="text" id="username" placeholder="请输入账号">
                    </div>
                    
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码">
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-link">忘记密码？</a>
                    </div>
                    
                    <button class="login-btn">登录</button>
                    
                    <div class="register-link">
                        还没有账号？ <a href="#">立即注册</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
